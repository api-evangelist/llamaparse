specification: FinOps Framework
specificationVersion: '1.0'
provider: LlamaParse
providerId: llamaparse
created: '2026-06-12'
modified: '2026-06-12'

billingModel: credit-based
description: >
  LlamaParse uses a credit-based billing model where all platform products (Parse, Extract,
  Classify, Split, Index, Sheets) are billed in credits. Credits are purchased via monthly
  subscription plans or consumed pay-as-you-go at $1.25 per 1,000 credits. Credits vary by
  product tier and page count, giving teams fine-grained cost control by selecting the
  appropriate processing tier for each document type.

focusColumns:
  - ChargePeriodStart
  - ChargePeriodEnd
  - ServiceName
  - ServiceCategory
  - UsageType
  - UsageUnit
  - UsageQuantity
  - BilledCurrency
  - BilledCost
  - EffectiveCost
  - PricingUnit
  - PricingQuantity

