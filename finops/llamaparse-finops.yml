creditPricing:
  regions:
    - name: North America and Europe
      pricePerCredit: 0.00125
      currency: USD
      description: $1.25 per 1,000 credits

principles:
  - name: Visibility
    description: >
      LlamaCloud exposes per-product, per-tier credit consumption in the dashboard and billing
      portal, enabling teams to attribute costs to document types and processing modes.
    capabilities:
      - Credit usage tracking per organization and project
      - Real-time billing and usage dashboard at cloud.llamaindex.ai
      - Pricing documentation listing credits-per-page for all tiers

  - name: Optimization
    description: >
      Cost optimization is built into the platform tier structure. Teams should select the
      lowest tier sufficient for their accuracy requirements, use file caching to reduce
      re-processing costs, and leverage classification before expensive parse/extract operations
      to filter out irrelevant documents.
    strategies:
      - Use fast tier (1 credit/page) for simple text-heavy PDFs
      - Use cost-effective tier (3 credits/page) for standard business documents
      - Cache files to avoid re-upload costs
      - Use Extract-only pricing on previously parsed documents
      - Pre-filter with Classify before agentic Parse or Extract
      - Use pay-as-you-go to avoid over-provisioning on variable workloads
